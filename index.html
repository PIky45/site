<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница-визитка</title>
    <!-- ИСПРАВЛЕНО: Подключаем правильный скрипт Telegram для работы Mini App -->
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff); /* Авто-подстройка под тему Telegram */
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { font-size: 16px; margin-bottom: 30px; opacity: 0.8; }
        .btn {
            display: block;
            width: 100%;
            max-width: 280px;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.1s ease;
        }
        .btn:active { transform: scale(0.98); }
        /* Кнопка перехода к другому боту */
        .btn-next {
            background-color: #2481cc;
            color: #ffffff;
        }
        /* Кнопка закрытия и возврата */
        .btn-close {
            background-color: var(--tg-theme-secondary-bg-color, #f1f1f1);
            color: var(--tg-theme-button-color, #2481cc);
        }
    </style>
</head>
<body>

    <h1>Приветствуем! 👋</h1>
    <p>Выберите необходимое действие ниже:</p>

    <!-- Кнопка 1: Откроет другого бота во внешнем окне Telegram -->
    <a href="https://t.me/pantryvpn_bot" target="_blank" class="btn btn-next">Перейти к боту VPN 🤖</a>

    <!-- Кнопка 2: Закрывает мини-приложение и возвращает в чат с текущим ботом -->
    <button onclick="closeApp()" class="btn btn-close">Вернуться к купонам ↩️</button>

    <script>
        // Инициализируем Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready(); // Сообщаем Telegram, что приложение готово
        tg.expand(); // Раскрываем окно на максимум для удобства

        // Функция закрытия приложения
        function closeApp() {
            tg.close(); // Теперь эта команда сработает отлично!
        }
    </script>
</body>
</html>
