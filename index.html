<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Страница-визитка</title>
    <script src="https://telegram.org"></script>
    <style>
        /* Настройки для гарантированного растягивания на весь экран */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            min-height: 100vh;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            
            /* ИСПРАВЛЕНО: Указан точный путь к картинке в репозитории GitHub */
            background-image: url('./image.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* ИСПРАВЛЕНО: Жесткое центрирование по всей высоте экрана без багов Telegram */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Затемняющая подложка, чтобы текст и кнопки хорошо читались на фоне картинки */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 1;
        }

        /* Контейнер для контента, чтобы он был поверх затемнения */
        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 320px;
        }

        h1 { 
            font-size: 26px; 
            margin-bottom: 10px; 
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }
        
        p { 
            font-size: 16px; 
            margin-bottom: 30px; 
            color: #f0f0f0;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            box-sizing: border-box;
            background-color: #2481cc;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(36, 129, 204, 0.4);
            transition: transform 0.1s ease, background-color 0.2s ease;
        }

        .btn:active { 
            transform: scale(0.98); 
            background-color: #1e6fa1;
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Приветствуем! 👋</h1>
        <p>Выберите необходимое действие ниже:</p>

        <!-- Кнопка 1: Откроет бота VPN -->
        <a href="https://t.me" target="_blank" class="btn">Перейти к боту VPN 🤖</a>

        <!-- Кнопка 2: Откроет бота с купонами -->
        <a href="https://t.me" target="_blank" class="btn">Перейти к купонам 🎟️</a>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        // Принудительно заставляем окно раскрыться на всю высоту
        setTimeout(() => {
            tg.expand();
        }, 100);
    </script>
</body>
</html>
